<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two Player Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <h1>Two Player Tic-Tac-Toe</h1>
    <p class="subtitle">Play locally with a friend on the same screen.</p>

    <section class="hud" aria-live="polite">
      <p id="status" class="status">Player X's turn</p>
      <div class="scoreboard">
        <span id="scoreX">X: 0</span>
        <span id="scoreO">O: 0</span>
        <span id="draws">Draws: 0</span>
      </div>
    </section>

    <section class="board" id="board" aria-label="Tic tac toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </section>

    <div class="actions">
      <button id="restartRound" class="btn">Restart Round</button>
      <button id="resetScore" class="btn btn-secondary">Reset Score</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
